<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WW2: Tactical Front</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; color: white; }
        
        /* ΠΡΟΕΙΔΟΠΟΙΗΣΗ ΠΕΡΙΣΤΡΟΦΗΣ */
        #rotate-notice {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        @media screen and (orientation: portrait) {
            #rotate-notice { display: flex; }
        }

        /* START SCREEN */
        #start-screen {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.wallpapersden.com/image/download/world-of-tanks-battle-art_a2puZmyUmZqaraWkpJRmbmdlrWZlbWU.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .play-btn { 
            padding: 15px 60px; font-size: 2.5rem; background: #8b0000; color: white; 
            border: 4px solid #f1c40f; cursor: pointer; font-weight: bold; border-radius: 50px;
        }

        /* JOYSTICK */
        #joy-base {
            position: absolute; bottom: 30px; left: 30px; width: 130px; height: 130px;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%; z-index: 100; display: none; touch-action: none;
        }
        #joy-stick {
            position: absolute; top: 35px; left: 35px; width: 60px; height: 60px;
            background: rgba(255,255,255,0.4); border-radius: 50%; touch-action: none;
        }

        /* FIRE BUTTON (ΔΙΑΦΑΝΟ ΜΕ ΣΦΑΙΡΑ) */
        #fire-btn {
            position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; z-index: 100; display: none; align-items: center; justify-content: center;
            font-size: 2rem; opacity: 0.7;
        }

        /* EXTRA BUTTONS */
        #extra-btns {
            position: absolute; bottom: 40px; right: 160px; display: none; flex-direction: column; gap: 10px; z-index: 100;
        }
        .small-btn { width: 60px; height: 45px; background: rgba(0,0,0,0.6); border: 1px solid #fff; color: white; border-radius: 5px; font-size: 0.7rem; }

        #hud { position: absolute; top: 15px; left: 15px; z-index: 50; display: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border-left: 4px solid #f1c40f; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; }
    </style>
</head>
<body>

<div id="rotate-notice">
    <h2>🔄 ΠΑΡΑΚΑΛΩ ΓΥΡΙΣΤΕ ΤΗΝ ΟΘΟΝΗ ΠΛΑΓΙΑ</h2>
    <p>Για να ξεκινήσει η μάχη, η οθόνη πρέπει να είναι σε Landscape mode.</p>
</div>

<div id="start-screen">
    <h1 style="font-size: 4rem; text-shadow: 4px 4px #000; color: #f1c40f;">BATTLEFRONT 1944</h1>
    <button class="play-btn" onclick="requestGame()">BATTLE</button>
</div>

<div id="hud">
    HP: <span id="hp">100</span> | AMMO: <span id="ammo">30</span> | KILLS: <span id="kills">0</span>
</div>

<div id="joy-base"><div id="joy-stick"></div></div>
<div id="fire-btn">🌑</div>
<div id="extra-btns">
    <button class="small-btn" onclick="jump()">JUMP</button>
    <button class="small-btn" onclick="toggleCrouch()">CROUCH</button>
    <button class="small-btn" onclick="reload()">RELOAD</button>
</div>

<div id="crosshair"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    let scene, camera, renderer, controls;
    let moveF = 0, moveR = 0, vY = 0;
    let hp = 100, ammo = 30, kills = 0, isCrouching = false;

    window.requestGame = () => {
        // Ζητάμε Fullscreen για καλύτερη εμπειρία
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('joy-base').style.display = 'block';
        document.getElementById('fire-btn').style.display = 'flex';
        document.getElementById('extra-btns').style.display = 'flex';
        document.getElementById('crosshair').style.display = 'block';
        init();
        animate();
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x353c35);
        scene.fog = new THREE.FogExp2(0x353c35, 0.02);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new PointerLockControls(camera, document.body);

        scene.add(new THREE.AmbientLight(0x888888));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);

        // GROUND & TUNNEL
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x222b1a}));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // ENEMIES (NPCs)
        for(let i=0; i<15; i++) {
            const enemy = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x111111}));
            enemy.position.set(Math.random()*80-40, 1, Math.random()*-80-20);
            scene.add(enemy);
        }

        camera.position.set(0, 1.7, 10);
        setupJoystick();
    }

    function setupJoystick() {
        const base = document.getElementById('joy-base');
        const stick = document.getElementById('joy-stick');
        
        base.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + 65;
            const centerY = rect.top + 65;
            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
            const angle = Math.atan2(dy, dx);
            
            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveF = -Math.sin(angle) * (dist/45);
            moveR = Math.cos(angle) * (dist/45);
        });

        base.addEventListener('touchend', () => {
            stick.style.transform = `translate(0px, 0px)`;
            moveF = 0; moveR = 0;
        });

        // ACTIONS
        document.getElementById('fire-btn').onclick = () => {
            if(ammo > 0) {
                ammo--;
                document.getElementById('ammo').innerText = ammo;
                camera.rotation.x += 0.05; // Recoil
                setTimeout(() => camera.rotation.x -= 0.05, 50);
                kills++;
                document.getElementById('kills').innerText = kills;
            }
        };

        window.jump = () => { if(camera.position.y <= 1.8) vY = 0.2; };
        window.toggleCrouch = () => {
            isCrouching = !isCrouching;
            camera.position.y = isCrouching ? 0.9 : 1.7;
        };
        window.reload = () => {
            ammo = 30;
            document.getElementById('ammo').innerText = ammo;
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        const speed = 0.3;
        controls.moveForward(moveF * speed);
        controls.moveRight(moveR * speed);

        // PHYSICS
        if(vY !== 0 || camera.position.y > 1.7) {
            camera.position.y += vY;
            vY -= 0.01;
            if(camera.position.y <= 1.7 && !isCrouching) {
                camera.position.y = 1.7;
                vY = 0;
            }
        }
        renderer.render(scene, camera);
    }

    // LOOK SENSITIVITY
    let lx, ly;
    document.addEventListener('touchstart', e => { 
        if(e.touches[0].clientX > window.innerWidth/2) {
            lx = e.touches[0].pageX; ly = e.touches[0].pageY; 
        }
    });
    document.addEventListener('touchmove', e => {
        if(e.touches[0].clientX > window.innerWidth/2) {
            camera.rotation.y -= (e.touches[0].pageX - lx) * 0.005;
            camera.rotation.x -= (e.touches[0].pageY - ly) * 0.005;
            lx = e.touches[0].pageX; ly = e.touches[0].pageY;
        }
    });
</script>
</body>
</html>
