<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WW2: Total War Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        
        /* ΑΡΧΙΚΟ ΜΕΝΟΥ (START SCREEN) */
        #start-screen {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1508614995948-4cd314c45b19?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; color: white; text-align: center;
        }
        #start-screen h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 3px 3px #ff0000; letter-spacing: 5px; }
        .play-btn { 
            padding: 20px 60px; font-size: 1.5rem; background: #8b0000; color: white; 
            border: none; cursor: pointer; border-radius: 5px; box-shadow: 0 5px #550000; transition: 0.2s;
        }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 2px #550000; }

        /* LOADOUT MENU */
        #loadout-menu { 
            position: absolute; width: 100%; height: 100%; background: rgba(20,20,20,0.95); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 150; color: #ccc;
        }
        .loadout-card { 
            background: #2d3436; padding: 20px; margin: 10px; border-left: 5px solid #d63031; 
            width: 300px; cursor: pointer; transition: 0.3s;
        }
        .loadout-card:hover { background: #3d4446; transform: scale(1.05); }

        /* HUD & CONTROLS */
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 10; display: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border-left: 4px solid #0f0; }
        #mobile-controls { position: absolute; bottom: 30px; left: 20px; display: none; grid-template-columns: repeat(3, 65px); gap: 8px; z-index: 20; }
        .m-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; border-radius: 50%; user-select: none; font-weight: bold; }
        #attack-btn { position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px; background: rgba(255,0,0,0.4); border: 3px solid #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 20; color: white; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>BATTLEFRONT 1944</h1>
    <p>Η ΕΜΠΕΙΡΙΑ ΤΟΥ Β' ΠΑΓΚΟΣΜΙΟΥ ΠΟΛΕΜΟΥ ΣΤΟΝ BROWSER ΣΟΥ</p>
    <button class="play-btn" onclick="showLoadout()">ENTER BATTLE</button>
</div>

<div id="loadout-menu">
    <h2>ΕΠΙΛΕΞΤΕ ΤΟΝ ΡΟΛΟ ΣΑΣ</h2>
    <div class="loadout-card" onclick="startGame('SNIPER')">
        <h3>SNIPER UNIT</h3>
        <p>Kar98k + Luger P08</p>
    </div>
    <div class="loadout-card" onclick="startGame('ASSAULT')">
        <h3>ASSAULT INFANTRY</h3>
        <p>MP40 + Shotgun</p>
    </div>
</div>

<div id="ui">
    <div>ΥΓΕΙΑ: <span id="hp">100</span>%</div>
    <div>SCORE: <span id="kills">0</span> / 40</div>
</div>
<div id="crosshair"></div>

<div id="mobile-controls">
    <div></div><div class="m-btn" id="btn-w">↑</div><div></div>
    <div class="m-btn" id="btn-a">←</div><div class="m-btn" id="btn-s">↓</div><div class="m-btn" id="btn-d">→</div>
</div>
<div id="attack-btn" onclick="fire()">FIRE</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/PointerLockControls.js';

    let scene, camera, renderer, controls;
    let moveF = false, moveB = false, moveL = false, moveR = false;
    let kills = 0;

    window.showLoadout = function() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('loadout-menu').style.display = 'flex';
    }

    window.startGame = function(type) {
        document.getElementById('loadout-menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('crosshair').style.display = 'block';
        document.getElementById('mobile-controls').style.display = 'grid';
        document.getElementById('attack-btn').style.display = 'flex';
        init();
        animate();
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x444d44);
        scene.fog = new THREE.FogExp2(0x444d44, 0.01);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        controls = new PointerLockControls(camera, document.body);

        // ΦΩΤΑ
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x666666));

        // ΕΔΑΦΟΣ
        const floorGeo = new THREE.PlaneGeometry(1000, 1000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d3528 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // ΣΤΡΑΤΙΩΤΕΣ (NPCs) - ΔΗΜΙΟΥΡΓΙΑ 10 ΣΤΡΑΤΙΩΤΩΝ ΑΝΑ ΟΜΑΔΑ
        for(let i=0; i<10; i++) {
            createSoldier(Math.random()*100 - 50, -80, 0x4b5320); // ΣΥΜΜΑΧΟΙ (ΠΡΑΣΙΝΟΙ)
            createSoldier(Math.random()*100 - 50, 80, 0x3e3e3e);  // ΑΞΟΝΑΣ (ΓΚΡΙ)
        }

        // ΤΟΥΝΕΛ
        createTunnel(0, 0);

        // LISTENERS
        setupMovement();
        camera.position.set(0, 1.7, 0);
    }

    function createSoldier(x, z, color) {
        const group = new THREE.Group();
        // Σώμα
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.3), new THREE.MeshStandardMaterial({color: color}));
        body.position.y = 1;
        // Κεφάλι (Κράνος)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({color: 0x222222}));
        head.position.y = 1.7;
        group.add(body, head);
        group.position.set(x, 0, z);
        scene.add(group);
    }

    function createTunnel(x, z) {
        const tunnelMat = new THREE.MeshStandardMaterial({color: 0x1a1a1a, side: THREE.DoubleSide});
        const tunnel = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 40, 8, 1, true), tunnelMat);
        tunnel.rotation.z = Math.PI / 2;
        tunnel.position.set(x, 0, z);
        scene.add(tunnel);
    }

    function setupMovement() {
        document.addEventListener('keydown', e => {
            if(e.code==='KeyW') moveF = true; if(e.code==='KeyS') moveB = true;
            if(e.code==='KeyA') moveL = true; if(e.code==='KeyD') moveR = true;
        });
        document.addEventListener('keyup', e => {
            if(e.code==='KeyW') moveF = false; if(e.code==='KeyS') moveB = false;
            if(e.code==='KeyA') moveL = false; if(e.code==='KeyD') moveR = false;
        });
        
        // Mobile Touches
        const touchBtn = (id, state) => {
            document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); state(true); });
            document.getElementById(id).addEventListener('touchend', (e) => { e.preventDefault(); state(false); });
        }
        touchBtn('btn-w', v => moveF = v); touchBtn('btn-s', v => moveB = v);
        touchBtn('btn-a', v => moveL = v); touchBtn('btn-d', v => moveR = v);
    }

    window.fire = function() {
        // Εφέ πυροβολισμού
        camera.position.y += 0.05;
        setTimeout(() => camera.position.y -= 0.05, 50);
        kills++;
        document.getElementById('kills').innerText = kills;
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = 0.1;
        if(moveF) controls.moveForward(delta * 5);
        if(moveB) controls.moveForward(-delta * 5);
        if(moveL) controls.moveRight(-delta * 5);
        if(moveR) controls.moveRight(delta * 5);
        renderer.render(scene, camera);
    }

    // Touch Look
    let startX, startY;
    document.addEventListener('touchstart', e => { startX = e.touches[0].pageX; startY = e.touches[0].pageY; });
    document.addEventListener('touchmove', e => {
        let dx = e.touches[0].pageX - startX;
        let dy = e.touches[0].pageY - startY;
        camera.rotation.y -= dx * 0.002;
        camera.rotation.x -= dy * 0.002;
        startX = e.touches[0].pageX; startY = e.touches[0].pageY;
    });
</script>
</body>
</html>
