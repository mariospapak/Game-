html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WW2: Total War</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', Gadget, sans-serif; touch-action: none; }
        
        /* ΑΡΧΙΚΟ ΜΕΝΟΥ */
        #start-screen {
            position: absolute; width: 100%; height: 100%;
            /* ΦΟΝΤΟ ΜΕ ΕΙΚΟΝΑ ΜΑΧΗΣ */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://wallpaperaccess.com/full/1152744.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; color: white; text-align: center;
        }
        #start-screen h1 { font-size: 4rem; margin-bottom: 30px; text-shadow: 5px 5px #000; color: #f1c40f; border-bottom: 5px solid #8b0000; }
        
        .play-btn { 
            padding: 25px 80px; font-size: 2rem; background: #8b0000; color: white; 
            border: 3px solid #fff; cursor: pointer; border-radius: 10px; font-weight: bold;
            text-transform: uppercase; transition: 0.3s;
        }
        .play-btn:hover { background: #ff0000; transform: scale(1.1); box-shadow: 0 0 20px #ff0000; }

        /* LOADOUT MENU */
        #loadout-menu { 
            position: absolute; width: 100%; height: 100%; background: rgba(10,10,10,0.95); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 150; color: white;
        }
        .loadout-card { 
            background: #1a1a1a; padding: 30px; margin: 15px; border: 2px solid #444; 
            width: 320px; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .loadout-card:hover { border-color: #f1c40f; background: #222; }

        /* HUD */
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 10; display: none; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px; font-size: 1.2rem; }
        #mobile-controls { position: absolute; bottom: 30px; left: 20px; display: none; grid-template-columns: repeat(3, 70px); gap: 10px; z-index: 20; }
        .m-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; border-radius: 15px; font-weight: bold; font-size: 1.5rem; }
        #attack-btn { position: absolute; bottom: 40px; right: 40px; width: 110px; height: 110px; background: rgba(255,0,0,0.6); border: 4px solid #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 20; color: white; font-weight: bold; font-size: 1.2rem; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>BATTLEFRONT 1944</h1>
    <button class="play-btn" onclick="showLoadout()">BATTLE</button>
</div>

<div id="loadout-menu">
    <h2>ΕΠΙΛΟΓΗ ΜΟΝΑΔΑΣ</h2>
    <div class="loadout-card" onclick="startGame('SNIPER')">
        <h3 style="color:#f1c40f">SNIPER UNIT</h3>
        <p>Kar98k + Luger</p>
    </div>
    <div class="loadout-card" onclick="startGame('ASSAULT')">
        <h3 style="color:#f1c40f">ASSAULT INFANTRY</h3>
        <p>MP40 + Shotgun</p>
    </div>
</div>

<div id="ui">
    <div>ΥΓΕΙΑ: <span id="hp">100</span>%</div>
    <div>SCORE: <span id="kills">0</span> / 40</div>
</div>
<div id="crosshair"></div>

<div id="mobile-controls">
    <div></div><div class="m-btn" id="btn-w">↑</div><div></div>
    <div class="m-btn" id="btn-a">←</div><div class="m-btn" id="btn-s">↓</div><div class="m-btn" id="btn-d">→</div>
</div>
<div id="attack-btn" onclick="fire()">FIRE</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    let scene, camera, renderer, controls;
    let moveF = false, moveB = false, moveL = false, moveR = false;
    let kills = 0;

    // Διόρθωση των functions για να είναι προσβάσιμες από τα κουμπιά
    window.showLoadout = function() {
        console.log("Button clicked");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('loadout-menu').style.display = 'flex';
    }

    window.startGame = function(type) {
        document.getElementById('loadout-menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('crosshair').style.display = 'block';
        document.getElementById('mobile-controls').style.display = 'grid';
        document.getElementById('attack-btn').style.display = 'flex';
        init();
        animate();
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x3d443d);
        scene.fog = new THREE.FogExp2(0x3d443d, 0.015);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        controls = new PointerLockControls(camera, document.body);

        // ΦΩΤΙΣΜΟΣ
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x555555));

        // ΠΙΣΤΑ
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 1000),
            new THREE.MeshStandardMaterial({ color: 0x2d3528 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // ΔΗΜΙΟΥΡΓΙΑ ΣΤΡΑΤΙΩΤΩΝ (Υψηλή αντίθεση χρωμάτων)
        for(let i=0; i<15; i++) {
            createSoldier(Math.random()*60-30, Math.random()*-100-20, 0x2e3b23); // ΣΥΜΜΑΧΟΙ (Dark Green)
            createSoldier(Math.random()*60-30, Math.random()*100+20, 0x1a1a1a);  // ΑΞΟΝΑΣ (Black/Grey)
        }
