<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WW2 Battlefront: Tunnels of War</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        
        /* Menu Loadout */
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; border: 5px double #444; }
        .btn { padding: 15px 30px; margin: 10px; background: #3d4d3d; color: white; border: 2px solid #666; cursor: pointer; font-size: 1.2rem; width: 250px; }
        .btn:hover { background: #5d6d5d; border-color: #0f0; }

        /* Mobile Controls */
        #mobile-controls { position: absolute; bottom: 30px; left: 20px; display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; z-index: 20; opacity: 0.6; }
        .m-btn { width: 60px; height: 60px; background: #444; color: white; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: bold; user-select: none; }
        #attack-btn { position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px; background: rgba(150,0,0,0.7); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 20; border: 4px solid #333; }
    </style>
</head>
<body>

<div id="menu">
    <h1>WW2 BATTLE SIMULATOR</h1>
    <p>ΕΠΙΛΕΞΤΕ ΟΠΛΙΣΜΟ ΠΡΙΝ ΤΗ ΜΑΧΗ</p>
    <button class="btn" onclick="start('SNIPER')">SNIPER + PISTOL</button>
    <button class="btn" onclick="start('ASSAULT')">RIFLE + SHOTGUN</button>
</div>

<div id="ui" style="display:none;">
    <div>HP: <span id="hp">100</span> | VEST: <span id="vest">0</span></div>
    <div>KILLS: <span id="kills">0</span> / 40</div>
    <div id="weapon">LOADOUT: -</div>
</div>
<div id="crosshair"></div>

<div id="mobile-controls" style="display:none;">
    <div></div><div class="m-btn" id="btn-w">W</div><div></div>
    <div class="m-btn" id="btn-a">A</div><div class="m-btn" id="btn-s">S</div><div class="m-btn" id="btn-d">D</div>
</div>
<div id="attack-btn" style="display:none;" onclick="handleAttack()">FIRE / HIT</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/PointerLockControls.js';

    let scene, camera, renderer, controls, raycaster;
    let moveF = false, moveB = false, moveL = false, moveR = false;
    let hp = 100, vest = 0, kills = 0;
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();

    window.start = function(type) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('mobile-controls').style.display = 'grid';
        document.getElementById('attack-btn').style.display = 'flex';
        document.getElementById('weapon').innerText = "LOADOUT: " + type;
        init();
        animate();
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202025);
        scene.fog = new THREE.FogExp2(0x202025, 0.015);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        controls = new PointerLockControls(camera, document.body);
        raycaster = new THREE.Raycaster();

        // ΦΩΤΙΣΜΟΣ
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x404040));

        // ΕΔΑΦΟΣ
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(500, 500),
            new THREE.MeshStandardMaterial({ color: 0x354230 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // ΒΑΣΕΙΣ (Forts)
        createFort(0, 0, -60, 0x555555); // Βάση Α
        createFort(0, 0, 60, 0x443322);  // Βάση Β

        // ΤΟΥΝΕΛ (Σήραγγες)
        createTunnel(0, 0, 0);

        // ΧΕΙΡΙΣΜΟΣ
        const onKeyDown = (e) => {
            if(e.code==='KeyW') moveF = true; if(e.code==='KeyS') moveB = true;
            if(e.code==='KeyA') moveL = true; if(e.code==='KeyD') moveR = true;
        };
        const onKeyUp = (e) => {
            if(e.code==='KeyW') moveF = false; if(e.code==='KeyS') moveB = false;
            if(e.code==='KeyA') moveL = false; if(e.code==='KeyD') moveR = false;
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // Mobile Events
        setupMobile('btn-w', val => moveF = val);
        setupMobile('btn-s', val => moveB = val);
        setupMobile('btn-a', val => moveL = val);
        setupMobile('btn-d', val => moveR = val);

        camera.position.y = 1.7;
    }

    function createFort(x, y, z, color) {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(20, 8, 10), new THREE.MeshStandardMaterial({color: color}));
        body.position.set(x, 4, z);
        body.castShadow = true;
        group.add(body);
        
        const tower = new THREE.Mesh(new THREE.BoxGeometry(6, 12, 6), new THREE.MeshStandardMaterial({color: color}));
        tower.position.set(x + 7, 6, z);
        group.add(tower);
        scene.add(group);
    }

    function createTunnel(x, y, z) {
        const mat = new THREE.MeshStandardMaterial({color: 0x222222});
        const wallL = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 40), mat);
        wallL.position.set(-3, 2, 0);
        const wallR = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 40), mat);
        wallR.position.set(3, 2, 0);
        const roof = new THREE.Mesh(new THREE.BoxGeometry(7, 0.5, 40), mat);
        roof.position.set(0, 4, 0);
        scene.add(wallL, wallR, roof);
    }

    function setupMobile(id, callback) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); callback(true); });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); callback(false); });
    }

    window.handleAttack = function() {
        console.log("Attack!");
        // Εφέ "κλωτσιάς" όπλου
        camera.rotation.x += 0.05;
        // Logic για kills (προσομοίωση)
        if(Math.random() > 0.8) {
            kills++;
            document.getElementById('kills').innerText = kills;
            if(kills >= 40) alert("ΝΙΚΗ! Η ΟΜΑΔΑ ΣΑΣ ΕΦΤΑΣΕ ΤΑ 40 KILLS");
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls.isLocked || /Android|iPhone/i.test(navigator.userAgent)) {
            const delta = 0.15;
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveF) - Number(moveB);
            direction.x = Number(moveR) - Number(moveL);
            direction.normalize();

            if (moveF || moveB) velocity.z -= direction.z * 400.0 * delta;
            if (moveL || moveR) velocity.x -= direction.x * 400.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
            
            // Gravity simple
            if(camera.position.y > 1.7) camera.position.y -= 0.1;
        }
        renderer.render(scene, camera);
    }

    // Για κινητά: Περιστροφή κάμερας με το δάχτυλο
    let touchX, touchY;
    document.addEventListener('touchstart', e => { touchX = e.touches[0].pageX; touchY = e.touches[0].pageY; });
    document.addEventListener('touchmove', e => {
        let dx = e.touches[0].pageX - touchX;
        let dy = e.touches[0].pageY - touchY;
        camera.rotation.y -= dx * 0.005;
        camera.rotation.x -= dy * 0.005;
        touchX = e.touches[0].pageX; touchY = e.touches[0].pageY;
    });
</script>
</body>
</html>
